services:
  sentiment-ai:
    build: .
    container_name: sentiment-staging
    ports:
      - "8080:8000"
    environment:
      - ENV=development
    networks:
      - cicd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  cicd-network:
    driver: bridge